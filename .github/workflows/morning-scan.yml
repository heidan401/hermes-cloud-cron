name: ☁️ 早盘引擎（云端兜底）

on:
  schedule:
    # 北京时间 (UTC+8) → UTC
    - cron: "0  1 * * 1-5"   # 09:00 隔夜早报
    - cron: "30 1 * * 1-5"   # 09:30 持仓风控
    - cron: "35 1 * * 1-5"   # 09:35 龙回头基准快照
    - cron: "0  2 * * 1-5"   # 10:00 通用反转扫描
    - cron: "15 2 * * 1-5"   # 10:15 龙回头执行指令
  push:  # 临时验证飞书通知链路（验证后移除）
  workflow_dispatch:  # 手动触发

jobs:
  engine:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: write  # 允许 git push 快照文件
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: ${{ github.workspace }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: 安装依赖
        run: |
          pip install akshare requests
      
      - name: 识别时点
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            SLOT="09:00"  # push 测试→直接跑早报
            echo "🧪 测试模式: 强制执行 09:00 隔夜早报"
          else
            HOUR=$(TZ='Asia/Shanghai' date +%H)
            MIN=$(TZ='Asia/Shanghai' date +%M)
            SLOT="${HOUR}:${MIN}"
            echo "当前北京时间: $SLOT"
          fi
          echo "slot=$SLOT" >> $GITHUB_OUTPUT
      
      - name: 🕘 09:00 隔夜早报
        if: steps.slot.outputs.slot == '09:00'
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: |
          python trading_engine/engine_runner.py 09:00 2>&1 | tee /tmp/engine_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          # 诊断输出
          {
            echo "=== 诊断 $(TZ='Asia/Shanghai' date +'%m/%d %H:%M:%S') ==="
            echo "EXIT_CODE: $EXIT_CODE"
            echo "FEISHU_APP_ID: $([ -n \"$FEISHU_APP_ID\" ] && echo '✅ 已设置' || echo '❌ 未设置')"
            echo "FEISHU_APP_SECRET: $([ -n \"$FEISHU_APP_SECRET\" ] && echo '✅ 已设置' || echo '❌ 未设置')"
            echo "FEISHU_CHAT_ID: $([ -n \"$FEISHU_CHAT_ID\" ] && echo '✅ 已设置 (前缀: '${FEISHU_CHAT_ID:0:4}...)' || echo '❌ 未设置')"
            echo "DASHSCOPE_API_KEY: $([ -n \"$DASHSCOPE_API_KEY\" ] && echo '✅ 已设置' || echo '❌ 未设置')"
            echo ""
            echo "=== 引擎输出 ==="
            cat /tmp/engine_output.txt
          } > /tmp/diag.txt
          cat /tmp/diag.txt
      
      - name: 📋 提交诊断日志
        if: steps.slot.outputs.slot == '09:00'
        run: |
          cp /tmp/diag.txt diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diagnostic.txt
          git diff --staged --quiet || git commit -m "📋 诊断 $(TZ='Asia/Shanghai' date +%m/%d_%H%M)"
          git push
      
      - name: 🛡️ 09:30 持仓风控
        if: steps.slot.outputs.slot == '09:30'
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: python trading_engine/engine_runner.py 09:30
      
      - name: 📸 09:35 龙回头快照
        if: steps.slot.outputs.slot == '09:35'
        run: python trading_engine/engine_runner.py 09:35

      - name: 📤 推送快照到仓库
        if: steps.slot.outputs.slot == '09:35'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dragon_snapshot.json
          git diff --staged --quiet || git commit -m "📸 龙回头快照 $(TZ='Asia/Shanghai' date +%m/%d_%H%M)"
          git push
      
      - name: 🔄 10:00 通用反转
        if: steps.slot.outputs.slot == '10:00'
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: python trading_engine/engine_runner.py 10:00
      
      - name: 🐉 10:15 龙回头执行
        if: steps.slot.outputs.slot == '10:15'
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: |
          git pull origin main 2>/dev/null || true
          python trading_engine/engine_runner.py 10:15
      
      