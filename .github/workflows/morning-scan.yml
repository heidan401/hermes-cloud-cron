name: ☁️ 早盘引擎（云端兜底）

on:
  schedule:
    - cron: "*/5 1,2 * * 1-5"  # 北京 09:00-10:55 每5分钟轮询（单cron避免多条目调度bug）
  push:
    branches:
      - test-*
  workflow_dispatch:

jobs:
  engine:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: ${{ github.workspace }}
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install akshare requests
      
      - name: 识别时点
        id: slot
        run: |
          if [ "${{ github.ref_name }}" = "test-all" ]; then
            echo "slot=test_all" >> $GITHUB_OUTPUT
            echo "run=true" >> $GITHUB_OUTPUT
            echo "🧪 全链路测试"
          else
            HOUR=$(TZ='Asia/Shanghai' date +%H)
            MIN=$(TZ='Asia/Shanghai' date +%M)
            SLOT="${HOUR}:${MIN}"
            echo "slot=$SLOT" >> $GITHUB_OUTPUT
            case "$SLOT" in
              09:00|09:30|09:35|10:00|10:15|11:00)
                echo "run=true" >> $GITHUB_OUTPUT
                echo "engine_slot=$SLOT" >> $GITHUB_OUTPUT
                echo "🎯 命中时点: $SLOT"
                ;;
              *)
                echo "run=false" >> $GITHUB_OUTPUT
                echo "⏭️  非目标时点: $SLOT"
                ;;
            esac
          fi

      - name: 📥 拉取快照（仅10:15）
        if: steps.slot.outputs.engine_slot == '10:15' || steps.slot.outputs.slot == 'test_all'
        run: git pull origin main 2>/dev/null || true

      - name: 🚀 执行引擎
        if: steps.slot.outputs.run == 'true'
        continue-on-error: true
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: |
          if [ "${{ steps.slot.outputs.slot }}" = "test_all" ]; then
            for slot in 09:00 09:30 09:35 10:00 10:15 11:00; do
              echo "=== $slot ==="
              python trading_engine/engine_runner.py "$slot" || true
            done
          else
            python trading_engine/engine_runner.py "${{ steps.slot.outputs.engine_slot }}"
          fi

      - name: 📤 推送快照（仅09:35）
        if: steps.slot.outputs.engine_slot == '09:35' || steps.slot.outputs.slot == 'test_all'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dragon_snapshot.json
          git diff --staged --quiet || git commit -m "📸 快照 $(TZ='Asia/Shanghai' date +%m/%d_%H%M)"
          git push