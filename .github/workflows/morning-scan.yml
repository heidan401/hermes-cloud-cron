name: ☁️ 早盘引擎（云端兜底）

on:
  schedule:
    - cron: "0  1 * * 1-5"   # 09:00 隔夜早报
    - cron: "30 1 * * 1-5"   # 09:30 持仓风控
    - cron: "35 1 * * 1-5"   # 09:35 龙回头基准快照
    - cron: "0  2 * * 1-5"   # 10:00 通用反转扫描
    - cron: "15 2 * * 1-5"   # 10:15 龙回头执行指令
  workflow_dispatch:

jobs:
  engine:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: ${{ github.workspace }}
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install akshare requests
      
      - name: 识别时点
        id: slot
        run: |
          if [ "${{ github.ref_name }}" = "test-all" ]; then
            SLOT="test_all"; echo "🧪 全链路测试"
          else
            HOUR=$(TZ='Asia/Shanghai' date +%H)
            MIN=$(TZ='Asia/Shanghai' date +%M)
            SLOT="${HOUR}:${MIN}"; echo "当前: $SLOT"
          fi
          echo "slot=$SLOT" >> $GITHUB_OUTPUT

      - name: 🕘 09:00 隔夜早报
        if: steps.slot.outputs.slot == '09:00' || steps.slot.outputs.slot == 'test_all'
        continue-on-error: true
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: python trading_engine/engine_runner.py 09:00

      - name: 🛡️ 09:30 持仓风控
        if: steps.slot.outputs.slot == '09:30' || steps.slot.outputs.slot == 'test_all'
        continue-on-error: true
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: python trading_engine/engine_runner.py 09:30

      - name: 📸 09:35 龙回头快照
        if: steps.slot.outputs.slot == '09:35' || steps.slot.outputs.slot == 'test_all'
        continue-on-error: true
        run: python trading_engine/engine_runner.py 09:35

      - name: 🔄 10:00 通用反转
        if: steps.slot.outputs.slot == '10:00' || steps.slot.outputs.slot == 'test_all'
        continue-on-error: true
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: python trading_engine/engine_runner.py 10:00

      - name: 🐉 10:15 龙回头执行
        if: steps.slot.outputs.slot == '10:15' || steps.slot.outputs.slot == 'test_all'
        continue-on-error: true
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: python trading_engine/engine_runner.py 10:15